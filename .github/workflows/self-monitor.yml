name: Daily CVE Monitor

on:
  schedule:
    - cron: "0 5 * * *"  # 8 AM Jordan (UTC+3)
  workflow_dispatch:

jobs:
  stackwatch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Restore CVE state
        uses: actions/cache@v4
        with:
          path: state.json
          key: stackwatch-state-${{ github.run_id }}
          restore-keys: stackwatch-state-

      - name: Run StackWatch
        run: bundle exec ruby -Ilib exe/stackwatch run --config stack.yml
        env:
          STACKWATCH_SLACK_WEBHOOK: ${{ secrets.STACKWATCH_SLACK_WEBHOOK }}

      - name: Save CVE state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: stackwatch-state-${{ github.run_id }}
